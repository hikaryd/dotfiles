- link:
    ~/.config/sketchybar:
      path: config/sketchybar
      create: true
      force: true
    ~/.config/rift/config.toml:
      path: config/rift/config.toml
      create: true
      force: true
    ~/.config/aerospace/aerospace.toml:
      path: config/aerospace/aerospace.toml
      create: true
      force: true
    ~/.paneru.toml:
      path: config/paneru/paneru.toml
      create: true
      force: true
    ~/.config/glide/glide.toml:
      path: config/glide/glide.toml
      create: true
      force: true

- shell:
    - description: "Enable separate Spaces per display (required for aerospace)"
      command: defaults write com.apple.spaces spans-displays -bool false
    - description: "Disable auto-rearrange Spaces by recent use"
      command: defaults write com.apple.dock mru-spaces -bool false
    - description: "Apply Dock changes"
      command: killall Dock
