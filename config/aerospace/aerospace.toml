# AeroSpace configuration
# Synced with Rift config

start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse behavior (matching Rift)
# on-focus-changed = ['move-mouse window-lazy-center']
on-focus-changed = []

# Default layout
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 30

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 5
outer.bottom = 5
outer.top = 5
outer.right = 5

# Key bindings
[mode.main.binding]

# --- Переключение воркспейсов (Alt + key) ---
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-d = 'workspace d'
alt-e = 'workspace e'
alt-q = 'workspace q'
alt-t = 'workspace t'
alt-w = 'workspace w'

# Switch to last workspace (Alt + Tab)
alt-tab = 'workspace-back-and-forth'

# --- Отправка окна на воркспейс (Alt + Shift + key) ---
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-d = 'move-node-to-workspace d'
alt-shift-e = 'move-node-to-workspace e'
alt-shift-q = 'move-node-to-workspace q'
alt-shift-t = 'move-node-to-workspace t'
alt-shift-w = 'move-node-to-workspace w'

# --- Навигация (Alt + H/J/K/L) ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- Перемещение окон (Alt + Shift + H/J/K/L) ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Стек/джойн (Cmd + Shift + keys) ---
cmd-shift-j = 'layout accordion tiles' # toggle stack
cmd-shift-h = 'join-with left'
cmd-shift-l = 'join-with right'

# --- Ресайз (Alt + Shift + Equal/Minus) ---
alt-shift-equal = 'resize smart +50'
alt-shift-minus = 'resize smart -50'

# --- Флоат/фуллскрин ---
alt-space = 'layout floating tiling'
cmd-shift-f = 'layout floating tiling'
alt-f = 'fullscreen'

# --- Сервисные ---
alt-ctrl-s = 'reload-config'
cmd-shift-q = 'close'
alt-shift-f = 'flatten-workspace-tree'

# --- Мультимонитор ---
alt-comma = 'focus-monitor prev'
alt-period = 'focus-monitor next'
alt-shift-comma = 'move-node-to-monitor prev'
alt-shift-period = 'move-node-to-monitor next'

# ============================================
# Window rules (matching Rift's app_rules)
# ============================================

# --- Floating windows ---

# Safari settings
[[on-window-detected]]
if.app-id = 'com.apple.Safari'
if.window-title-regex-substring = '^(General|(Tab|Password|Website|Extension)s|AutoFill|Se(arch|curity)|Privacy|Advance)$|Preferences|Настройки'
run = 'layout floating'

# Brave settings
[[on-window-detected]]
if.app-id = 'com.brave.Browser'
if.window-title-regex-substring = '^(General|(Tab|Password|Website|Extension)s|AutoFill|Se(arch|curity)|Privacy|Advance)$|Preferences|Settings'
run = 'layout floating'

# Arc settings
